services:
  # 1. Servicio del Backend (FastAPI)
  - type: web
    name: alpha-agent-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11" # 👈 FUERZA A USAR PYTHON stable

  # 2. Servicio del Frontend (Streamlit)
  - type: web
    name: alpha-agent-frontend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    autoDeploy: true
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: alpha-agent-backend
          property: host # 👈 CAMBIADO DE 'url' A 'host'
       - key: PYTHON_VERSION
        value: "3.11" # 👈 FUERZA A USAR PYTHON stable